{% extends "base.html" %}

{% block title %}Rejestracja - Roll The Dice RPG{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-copy">
        <p class="eyebrow">Nowy gracz</p>
        <h1>Zaloz konto i przygotuj pierwsza karte.</h1>
    </div>
    <form class="panel form-panel" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button" type="submit">Utworz konto</button>
    </form>
</section>
{% endblock %}
