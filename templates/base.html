{% load static %}
<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Roll The Dice RPG{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>
    <header class="shell topbar">
        <a class="brand" href="{% url 'landing' %}">Roll The Dice RPG</a>
        <nav class="nav">
            {% if request.user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Stół</a>
                <a href="{% url 'profile' %}">Profil</a>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button class="nav-button" type="submit">Wyloguj się</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Logowanie</a>
                <a class="button button-small" href="{% url 'register' %}">Rejestracja</a>
            {% endif %}
        </nav>
    </header>
    <main class="shell">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
