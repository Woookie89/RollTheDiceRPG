{% if error %}
    <div class="alert">{{ error }}</div>
{% elif roll %}
    <article class="roll-card">
        <p>{{ roll.label|default:roll.expression }}</p>
        <strong>{{ roll.total }}</strong>
        <span>
            Kości: {{ roll.result.rolls|join:", " }}
            {% if roll.result.modifier %} / modyfikator {{ roll.result.modifier }}{% endif %}
            {% if roll.context %} / {{ roll.context }}{% endif %}
        </span>
    </article>
{% endif %}
