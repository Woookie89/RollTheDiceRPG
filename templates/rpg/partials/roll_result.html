{% if error %}
    <div class="alert">{{ error }}</div>
{% elif roll %}
    <article class="roll-card">
        <p>{{ roll.label|default:roll.expression }}</p>
        <strong>{{ roll.total }}</strong>
        <span>{{ roll.result.rolls|join:", " }}{% if roll.result.modifier %} / mod {{ roll.result.modifier }}{% endif %}</span>
    </article>
{% endif %}
